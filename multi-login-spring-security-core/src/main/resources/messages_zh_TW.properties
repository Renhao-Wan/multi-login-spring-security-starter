# Multi-Login Spring Security Starter 國際化訊息資源檔案
# 預設語言：繁體中文

# ========================================
# Core 模組 - 錯誤訊息
# ========================================
multi.login.error.client.type.unknown=未知的客戶端類型: {0}
multi.login.error.authentication.failed=認證失敗
multi.login.error.config.param.name.mismatch=paramName 必須包含 principalParamName 和 credentialParamName 的所有參數，缺失參數: {0}
multi.login.error.client.type.not.determined=無法確定客戶端類型且未配置預設類型
multi.login.error.business.logic.not.found=未找到客戶端類型 {0} 對應的業務認證邏輯
multi.login.error.principal.is.null=認證失敗：使用者詳情為空

# ========================================
# Core 模組 - 警告訊息
# ========================================
multi.login.warn.fallback.query.params=JSON 請求體解析失敗，降級使用查詢參數
multi.login.warn.client.type.default=客戶端類型未找到或不在配置列表中，使用預設客戶端類型: {0}
multi.login.warn.content.type.not.json=Content-Type 不是 application/json，當前類型: {0}

# ========================================
# Core 模組 - 調試訊息
# ========================================
multi.login.debug.process.url.generated=為登入方式 {0} 自動生成處理路徑: {1}
multi.login.debug.param.name.merged=為登入方式 {0} 自動合併參數名: {1}
multi.login.debug.authentication.success=認證成功，客戶端類型: {0}

