name: Java CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: [ '17', '21' ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test with Java ${{ matrix.java-version }}
        run: mvn -B clean test --file pom.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: |
            ./target/site/jacoco/jacoco.xml
            ./multi-login-spring-security-core/target/site/jacoco/jacoco.xml
            ./multi-login-spring-security-autoconfigure/target/site/jacoco/jacoco.xml
            ./multi-login-spring-security-starter/target/site/jacoco/jacoco.xml
          fail_ci_if_error: true
          verbose: true